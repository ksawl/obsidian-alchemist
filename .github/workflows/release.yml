name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Attest main.js
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: dist/main.js

      - name: Attest styles.css
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: dist/styles.css

      - name: Attest manifest.json
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: dist/manifest.json

      - name: Upload to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release upload "$TAG" dist/main.js dist/manifest.json dist/styles.css --clobber
